<html lang="en">
<head>

    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }div{
            height:50vh;

<body style="background-color: mediumslateblue">
    <div>
    <h1>DIGITAL CLOCK</h1>
    <input type="text"></input>
    </div>
    </body>
<script>
    setInterval(()=>{
        let date=new Date();
        let time=date.toLocaleTimeString();
        console.log(time);
        let settime=document.querySelector("input");
        settime.value=time;
    },1000)
</script>
